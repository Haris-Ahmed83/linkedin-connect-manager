name: LinkedIn Messaging

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

env:
  LINKEDIN_USERNAME: ${{ secrets.LINKEDIN_USERNAME }}
  LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}

jobs:
  message:
    runs-on: [self-hosted, windows]
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install playwright python-dotenv
          playwright install chromium

      - name: Run messaging script
        run: python scripts/main.py --oneshot
        timeout-minutes: 15

      - name: Commit tracking state back to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tracking.json
          git diff --staged --quiet || git commit -m "update tracking state [skip ci]"
          git push