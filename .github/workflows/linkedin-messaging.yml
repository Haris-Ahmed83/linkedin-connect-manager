name: LinkedIn Messaging

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

env:
  LINKEDIN_USERNAME: ${{ secrets.LINKEDIN_USERNAME }}
  LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
  LINKEDIN_COOKIES: ${{ secrets.LINKEDIN_COOKIES }}

jobs:
  message:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install linkedin-api python-dotenv

      - name: Run messaging script
        run: python scripts/main.py --oneshot
        timeout-minutes: 5

      - name: Commit tracking state back to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tracking.json
          git diff --staged --quiet || git commit -m "update tracking state [skip ci]"
          git push
