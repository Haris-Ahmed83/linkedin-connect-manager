name: LinkedIn Messaging

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

env:
  LINKEDIN_USERNAME: ${{ secrets.LINKEDIN_USERNAME }}
  LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
  LINKEDIN_COOKIES: ${{ secrets.LINKEDIN_COOKIES }}

jobs:
  message:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb
          pip install playwright python-dotenv
          playwright install chromium

      - name: Cache Chromium profile
        uses: actions/cache@v4
        with:
          path: .chromium-profile
          key: chromium-profile-${{ runner.os }}
          restore-keys: |
            chromium-profile-${{ runner.os }}

      - name: Run messaging script
        run: xvfb-run -a python scripts/main.py --oneshot
        timeout-minutes: 10

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-debug
          path: |
            scripts/login_debug.png
            scripts/login_debug.html
          if-no-files-found: ignore

      - name: Commit tracking state back to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add tracking.json
          git diff --staged --quiet || git commit -m "update tracking state [skip ci]"
          git push